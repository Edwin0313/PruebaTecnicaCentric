<section class="crud-section">
    <header class="crud-header">
        <h2 id="page-title">Reporte de Estado de Cuenta</h2>
    </header>

    <app-reporte-form [listaClientes]="listaClientes()" [isLoading]="isLoading()" (generar)="generarReporte($event)">
    </app-reporte-form>

    <app-reporte-list [listaReporte]="listaReporte()" [busquedaRealizada]="busquedaRealizada()"
        (exportarPdf)="exportarPDF()">
    </app-reporte-list>

</section>
